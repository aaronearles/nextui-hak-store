name: Build Storefront.json

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - storefront_base.json
      - pak.json
      - app/storefront_builder.go

permissions:
  contents: write

jobs:

  build-storefront:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Build Storefront.json
        run: go run app/storefront_builder.go
        env:
          GOWORK: off
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit storefront.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add storefront.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Rebuild storefront.json"
            git push
          fi
